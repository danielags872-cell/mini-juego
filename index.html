<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    background-image:url('foto4.jpg');
    background-size:cover;
    background-position:center;
    transition:background-image 1s ease-in-out;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
    max-width:700px;
    padding:20px;
}

h1{
    margin-bottom:20px;
    font-size:30px;
    opacity:0;
    transition:1s;
}

p{
    font-size:18px;
    line-height:1.6;
    min-height:120px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:25px;
    background:white;
    color:#222;
    font-weight:bold;
    cursor:pointer;
}

.zoom{
    animation:zoomEffect 10s ease-in-out infinite alternate;
}

@keyframes zoomEffect{
    from{background-size:100%}
    to{background-size:110%}
}

/* latido */
.heartbeat{
    animation:heartbeat 0.8s infinite;
}

@keyframes heartbeat{
    0%{transform:scale(1)}
    25%{transform:scale(1.05)}
    50%{transform:scale(1.1)}
    75%{transform:scale(1.05)}
    100%{transform:scale(1)}
}

.final{
    font-size:42px;
    font-weight:bold;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body class="zoom">

<div class="container">
    <h1 id="title"></h1>
    <p id="message"></p>
    <button id="btn">Toca aquí</button>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const title = document.getElementById("title");
const message = document.getElementById("message");
const music = document.getElementById("bgMusic");

let started = false;
let step = 0;

const texts = [
"Dilan, para Valeria Conde ❤️",
"Quiero decirte algo sin prisa...",
"Porque contigo todo se siente diferente.",
"No es algo superficial… es real.",
"Contigo siento una paz que no había sentido antes.",
"Cuando estoy contigo… todo pesa menos.",
"Me gusta cómo somos, incluso en lo simple.",
"Me gusta cuando jugamos, cuando nos molestamos, cuando solo somos nosotros.",
"Hay cosas pequeñas que para mí lo son todo.",
"Como nuestras risas… nuestras palabras raras… nuestros momentos.",
"Y es que contigo, hasta lo cotidiano se vuelve especial.",
"A veces no soy perfecto… lo sé.",
"A veces sobrepienso más de lo que debería.",
"Pero todo eso nace de lo mucho que me importas.",
"Porque sí quiero que lo nuestro funcione.",
"No para un rato… sino para algo real.",
"Yo sí me imagino un futuro contigo.",
"Construyendo… creciendo… aprendiendo juntos.",
"No quiero cambiarte… me gustas tal y como eres.",
"Solo quiero que ambos mejoremos juntos.",
"Porque lo que tenemos vale la pena.",
"Y sé que algún día veremos todo esto y nos reiremos.",
"Porque lo importante… es que estamos aquí.",
"Intentándolo de verdad.",
"Yo estoy aquí… sincero.",
"Con ganas reales de que esto funcione.",
"Y con algo muy claro en el corazón...",
"Hay algo que quiero que sientas...",
""
];

const images = [
"foto4.jpg","foto1.jpg","foto2.jpg","foto3.jpg","foto5.jpg","foto6.jpg",
"foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg","foto6.jpg",
"foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg","foto6.jpg",
"foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg","foto6.jpg","foto1.jpg",
"foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"
];

function typeText(text, element, speed=35){
    element.innerHTML="";
    let i=0;
    let interval=setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;
        if(i>=text.length) clearInterval(interval);
    }, speed);
}

btn.addEventListener("click", ()=>{

    if(!started){
        music.volume = 0;
        music.play().catch(()=>{});
        started = true;

        let v=0;
        let fade=setInterval(()=>{
            if(v<1){
                v+=0.05;
                music.volume=v;
            }else{
                clearInterval(fade);
            }
        },200);
    }

    step++;

    if(images[step-1]){
        document.body.style.backgroundImage = `url('${images[step-1]}')`;
    }

    if(step === 1){
        title.style.opacity = 1;
        typeText(texts[0], title);
        btn.innerText="Sigue...";
    }
    else if(step < texts.length){
        typeText(texts[step-1], message);
    }
    else{
        activarHold();
    }
});

function activarHold(){
    message.innerHTML="Mantén presionado para sentirlo...";
    btn.innerText="Mantén aquí ❤️";

    let holdTime = 0;
    let interval;

    btn.onmousedown = btn.ontouchstart = () => {
        btn.classList.add("heartbeat");

        interval = setInterval(() => {
            holdTime += 0.1;
            music.volume = Math.min(1, music.volume + 0.02);

            if(holdTime >= 2){
                clearInterval(interval);
                mostrarFinal();
            }
        }, 100);
    };

    btn.onmouseup = btn.ontouchend = () => {
        clearInterval(interval);
        holdTime = 0;
        btn.classList.remove("heartbeat");
    };
}

function mostrarFinal(){
    btn.style.display="none";
    title.innerText="";
    message.innerHTML = `
        <div class="final">Te amo ❤️</div>
        <br>
        <div style="font-size:18px;">att: el amor de tu vida</div>
    `;
    music.volume = 0.5;
}
</script>

</body>
</html>
