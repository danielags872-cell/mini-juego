<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    background-image:url('foto4.jpg'); /* entrada con impacto */
    background-size:cover;
    background-position:center;
    transition:background-image 1s ease-in-out;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    text-align:center;
    max-width:700px;
    padding:20px;
}

h1{
    margin-bottom:20px;
    font-size:28px;
    opacity:0;
    transition:1s;
}

p{
    font-size:18px;
    line-height:1.6;
    min-height:120px;
}

button{
    margin-top:20px;
    padding:12px 22px;
    border:none;
    border-radius:25px;
    background:white;
    color:#222;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

.zoom{
    animation:zoomEffect 8s ease-in-out infinite alternate;
}

@keyframes zoomEffect{
    from{background-size:100%}
    to{background-size:110%}
}

.final{
    font-size:40px;
    font-weight:bold;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body class="zoom">

<div class="container">
    <h1 id="title">Esto es para ti...</h1>
    <p id="message"></p>
    <button id="btn">Toca aquí</button>
</div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const btn = document.getElementById("btn");
const title = document.getElementById("title");
const message = document.getElementById("message");
const music = document.getElementById("bgMusic");

let started = false;
let step = 0;

const texts = [
"Contigo siento algo diferente... algo real.",
"No es algo superficial. Yo sí me imagino un futuro contigo.",
"Lo nuestro vale más que cualquier discusión.",
"Cuando te digo algo... es porque me importas.",
"Me encanta todo lo que somos, incluso lo pequeño.",
"Esta app es para que tengas un pedacito de mí siempre.",
"Yo estoy aquí... de verdad.",
"Te amo ❤️"
];

const images = [
"foto4.jpg",
"foto1.jpg",
"foto2.jpg",
"foto3.jpg",
"foto5.jpg",
"foto6.jpg",
"foto2.jpg",
"foto4.jpg"
];

// efecto escritura
function typeText(text, element, speed=35){
    element.innerHTML="";
    let i=0;
    let interval=setInterval(()=>{
        element.innerHTML += text.charAt(i);
        i++;
        if(i>=text.length) clearInterval(interval);
    }, speed);
}

btn.addEventListener("click", ()=>{

    if(!started){
        music.volume = 0;
        music.play().catch(()=>{});
        started = true;

        let v=0;
        let fade=setInterval(()=>{
            if(v<1){
                v+=0.05;
                music.volume=v;
            }else{
                clearInterval(fade);
            }
        },200);
    }

    step++;

    if(images[step-1]){
        document.body.style.backgroundImage = `url('${images[step-1]}')`;
    }

    if(step === 1){
        title.style.opacity = 1;
        typeText(texts[0], message);
        btn.innerText="Sigue...";
    }
    else if(step <= texts.length){
        typeText(texts[step-1], message);
    }
    else{
        btn.style.display="none";
        title.innerText="";
        message.innerHTML="<div class='final'>Te amo ❤️</div>";
        music.volume = 0.4; // baja un poco para el final
    }
});
</script>

</body>
</html>
